{% extends "base.html" %}
{% block title %}Register — Managiaa{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo text-center">
            <img src="{{ url_for('static', filename='img/full logo.png') }}" alt="Managiaa" style="max-width: 220px; margin-bottom: 20px;">
            <p>Create your account</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <label class="form-label" for="full_name">Full Name</label>
                <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Min 4 characters" required minlength="4">
            </div>
            <div class="mb-4">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn btn-accent w-100 mb-3">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>
        <p class="text-center mt-3" style="font-size:0.85rem;color:var(--text-muted);">
            Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent);">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
