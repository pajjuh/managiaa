{% extends "base.html" %}
{% block title %}403 — Access Denied — Managiaa{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card text-center" style="max-width: 520px; padding: 60px 40px;">
        <div style="margin-bottom: 32px;">
            <div style="font-size: 8rem; font-weight: 900; line-height: 1; background: linear-gradient(135deg, #f59e0b, #eab308); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -4px;">403</div>
        </div>
        <h2 style="font-weight: 800; font-size: 1.6rem; margin-bottom: 12px; color: var(--text-primary);">Access denied</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px;">You don't have permission to access this resource. If you believe this is a mistake, contact your organization admin.</p>
        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('dashboard') }}" class="btn btn-accent" style="padding: 12px 28px; border-radius: 12px; font-weight: 700;">
                <i class="bi bi-house me-2"></i>Dashboard
            </a>
            <a href="javascript:history.back()" class="btn" style="padding: 12px 28px; border-radius: 12px; font-weight: 700; border: 1px solid var(--border); color: var(--text-secondary);">
                <i class="bi bi-arrow-left me-2"></i>Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
